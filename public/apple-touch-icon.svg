<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" rx="40" fill="#09090B"/>
  <!-- Halo bleu central -->
  <circle cx="90" cy="90" r="60" fill="#3B82F6" opacity="0.06"/>
  <!-- Connexions réseau -->
  <line x1="90" y1="90" x2="42" y2="42" stroke="#3B82F6" stroke-width="2.5" opacity="0.5"/>
  <line x1="90" y1="90" x2="138" y2="42" stroke="#3B82F6" stroke-width="2.5" opacity="0.5"/>
  <line x1="90" y1="90" x2="42" y2="138" stroke="#3B82F6" stroke-width="2.5" opacity="0.5"/>
  <line x1="90" y1="90" x2="138" y2="138" stroke="#3B82F6" stroke-width="2.5" opacity="0.5"/>
  <!-- Nœuds satellites -->
  <circle cx="42"  cy="42"  r="10" fill="#06B6D4" opacity="0.85"/>
  <circle cx="138" cy="42"  r="10" fill="#06B6D4" opacity="0.85"/>
  <circle cx="42"  cy="138" r="10" fill="#06B6D4" opacity="0.85"/>
  <circle cx="138" cy="138" r="10" fill="#06B6D4" opacity="0.85"/>
  <!-- Nœud central principal -->
  <circle cx="90" cy="90" r="18" fill="#3B82F6" opacity="0.2"/>
  <circle cx="90" cy="90" r="12" fill="#3B82F6"/>
</svg>
