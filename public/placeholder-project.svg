<svg viewBox="0 0 400 225" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="225" fill="#111115"/>
  <!-- Grille de fond -->
  <line x1="0" y1="75" x2="400" y2="75" stroke="#27272A" stroke-width="0.5" opacity="0.5" stroke-dasharray="4 12"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#27272A" stroke-width="0.5" opacity="0.5" stroke-dasharray="4 12"/>
  <line x1="100" y1="0" x2="100" y2="225" stroke="#27272A" stroke-width="0.5" opacity="0.5" stroke-dasharray="4 12"/>
  <line x1="200" y1="0" x2="200" y2="225" stroke="#27272A" stroke-width="0.5" opacity="0.5" stroke-dasharray="4 12"/>
  <line x1="300" y1="0" x2="300" y2="225" stroke="#27272A" stroke-width="0.5" opacity="0.5" stroke-dasharray="4 12"/>
  <!-- Connexions réseau -->
  <line x1="60" y1="112" x2="160" y2="112" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="112" x2="250" y2="65" stroke="#3B82F6" stroke-width="1" opacity="0.25"/>
  <line x1="160" y1="112" x2="250" y2="112" stroke="#3B82F6" stroke-width="1" opacity="0.25"/>
  <line x1="160" y1="112" x2="250" y2="160" stroke="#3B82F6" stroke-width="1" opacity="0.25"/>
  <line x1="250" y1="65" x2="350" y2="45" stroke="#06B6D4" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="65" x2="350" y2="85" stroke="#06B6D4" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="160" x2="350" y2="140" stroke="#06B6D4" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="160" x2="350" y2="180" stroke="#06B6D4" stroke-width="1" opacity="0.2"/>
  <!-- Firewall (gauche) -->
  <rect x="30" y="100" width="30" height="24" rx="3" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>
  <line x1="38" y1="100" x2="38" y2="124" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>
  <line x1="46" y1="100" x2="46" y2="124" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>
  <line x1="54" y1="100" x2="54" y2="124" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>
  <text x="45" y="136" text-anchor="middle" fill="#F59E0B" font-size="7" font-family="monospace" opacity="0.7">FW</text>
  <!-- Routeur core (centre-gauche) -->
  <circle cx="160" cy="112" r="14" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="160" cy="112" r="5" fill="#3B82F6" opacity="0.8"/>
  <text x="160" y="136" text-anchor="middle" fill="#3B82F6" font-size="7" font-family="monospace" opacity="0.8">CORE</text>
  <!-- Switch distribution (centre) -->
  <rect x="236" y="100" width="28" height="24" rx="3" fill="rgba(6,182,212,0.1)" stroke="#06B6D4" stroke-width="1" opacity="0.7"/>
  <circle cx="250" cy="112" r="4" fill="#06B6D4" opacity="0.6"/>
  <text x="250" y="136" text-anchor="middle" fill="#06B6D4" font-size="7" font-family="monospace" opacity="0.7">DIST</text>
  <!-- Nœuds access (droite) -->
  <circle cx="350" cy="45" r="6" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
  <circle cx="350" cy="85" r="6" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
  <circle cx="350" cy="140" r="6" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
  <circle cx="350" cy="180" r="6" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
  <!-- Labels nœuds access -->
  <text x="365" y="48" fill="#52525B" font-size="7" font-family="monospace">SRV-01</text>
  <text x="365" y="88" fill="#52525B" font-size="7" font-family="monospace">SRV-02</text>
  <text x="365" y="143" fill="#52525B" font-size="7" font-family="monospace">CLI-01</text>
  <text x="365" y="183" fill="#52525B" font-size="7" font-family="monospace">CLI-02</text>
  <!-- Label bas -->
  <text x="200" y="215" text-anchor="middle" fill="#3F3F46" font-size="9" font-family="monospace" letter-spacing="3">NETWORK DIAGRAM</text>
</svg>
